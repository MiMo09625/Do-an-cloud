<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Ghi chú</title>
    <!-- Thêm icon mây cho giống logo hệ thống -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 8px; /* Bo góc ít lại để trông cứng cáp chuẩn Enterprise */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-area i {
            font-size: 3.5rem;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 1px;
        }
        /* Style form chuẩn Cisco/Enterprise */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
            font-size: 0.9rem;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 4px; /* Vuông vức */
            background: #2b2b2b;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #4CAF50, #2196F3);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
        }
        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
        }
        .links a {
            color: #2196F3;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-cloud"></i>
            <h2>GHI CHÚ CLOUD</h2>
        </div>
        
        <div class="form-group">
            <label>Tên đăng nhập / Username</label>
            <input type="text" id="usernameInput" placeholder="Nhập tên đăng nhập..." required>
        </div>

        <div class="form-group">
            <label>Mật khẩu / Password</label>
            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu...">
        </div>

        <div class="form-group">
            <label>Quốc gia hoặc khu vực</label>
            <select id="regionSelect">
                <option value="vn">Việt Nam</option>
                <option value="us">Hoa Kỳ</option>
                <option value="other">Khác</option>
            </select>
        </div>

        <button onclick="login()">Đăng nhập hệ thống</button>

        <div class="links">
            <a href="#">Quên mật khẩu?</a> | <a href="#">Tạo tài khoản mới</a>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('usernameInput').value;
            // Ở phiên bản hiện tại, hệ thống dùng Tên để tạo không gian riêng
            if(name.trim() !== "") {
                localStorage.setItem('userName', name.trim());
                window.location.href = '/'; 
            } else {
                alert("⚠️ Vui lòng nhập Tên đăng nhập!");
            }
        }

        // Bấm Enter ở ô nào cũng đăng nhập được
        document.getElementById('usernameInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
