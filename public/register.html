<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản Cisco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: "CiscoSans", Arial, sans-serif; display: flex; justify-content: center; padding: 50px 0; }
        .register-card { width: 100%; max-width: 450px; padding: 20px; text-align: center; }
        h2 { font-size: 28px; color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-label { display: flex; color: #333; font-size: 14px; margin-bottom: 5px; font-weight: 500; }
        .form-control { border: 1px solid #ccc; border-radius: 4px; padding: 10px; margin-bottom: 15px; }
        .btn-register { background-color: #007aa3; color: white; border: none; border-radius: 50px; padding: 12px; width: 100%; font-weight: bold; margin-top: 20px; }
        .btn-register:hover { background-color: #005f7a; }
        .login-link { margin-top: 25px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Tạo Tài Khoản</h2>
        <p>* cho biết trường bắt buộc</p>

        <form action="/register" method="POST">
            <div class="mb-2 text-start">
                <label class="form-label">Tên *</label>
                <input type="text" name="name" class="form-control" required placeholder="Tên của bạn">
            </div>
            <div class="mb-2 text-start">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-control" required placeholder="Email *">
            </div>
            <div class="mb-2 text-start">
                <label class="form-label">Mật khẩu *</label>
                <input type="password" name="password" class="form-control" required placeholder="Mật khẩu *">
            </div>
            <div class="mb-2 text-start">
                <label class="form-label">Quốc gia hoặc khu vực *</label>
                <select class="form-select form-control">
                    <option selected>Việt Nam</option>
                    <option>Hoa Kỳ</option>
                </select>
            </div>
            
            <button type="submit" class="btn-register">Đăng ký</button>
        </form>

        <div class="login-link">
            Đã có tài khoản? <a href="/" style="color: #007aa3; text-decoration: none;">Đăng nhập</a>
        </div>
    </div>
</body>
</html>
