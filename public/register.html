<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Ghi chú Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1f1f1f; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #333; }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area i { font-size: 3.5rem; color: #4CAF50; margin-bottom: 10px; }
        h2 { margin: 0; font-size: 1.5rem; color: #fff; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 0.9rem; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 4px; background: #2b2b2b; color: white; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 8px rgba(76, 175, 80, 0.3); }
        button { width: 100%; padding: 14px; background: linear-gradient(45deg, #4CAF50, #2196F3); color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        .links { margin-top: 20px; text-align: center; font-size: 0.85rem; }
        .links span { color: #2196F3; cursor: pointer; margin: 0 10px; transition: 0.3s; }
        .links span:hover { text-decoration: underline; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-cloud"></i>
            <h2 id="formTitle">ĐĂNG NHẬP HỆ THỐNG</h2>
        </div>
        
        <div class="form-group">
            <label>Tên đăng nhập / Username</label>
            <input type="text" id="usernameInput" placeholder="Nhập tên đăng nhập..." required>
        </div>

        <div class="form-group">
            <label>Mật khẩu / Password</label>
            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu..." required>
        </div>

        <div class="form-group" id="regionGroup" style="display: none;">
            <label>Quốc gia hoặc khu vực</label>
            <select id="regionSelect">
                <option value="vn">Việt Nam</option>
                <option value="us">Hoa Kỳ</option>
                <option value="other">Khác</option>
            </select>
        </div>

        <button id="submitBtn" onclick="submitForm()">Đăng nhập</button>

        <div class="links">
            <span id="toggleBtn" onclick="toggleMode()">Chưa có tài khoản? Tạo tài khoản mới</span>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        // Chuyển đổi qua lại giữa Form Đăng Nhập và Form Đăng Ký
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('formTitle').innerText = isLoginMode ? "ĐĂNG NHẬP HỆ THỐNG" : "TẠO TÀI KHOẢN MỚI";
            document.getElementById('submitBtn').innerText = isLoginMode ? "Đăng nhập" : "Đăng ký tài khoản";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "Chưa có tài khoản? Tạo tài khoản mới" : "Đã có tài khoản? Quay lại Đăng nhập";
            document.getElementById('regionGroup').style.display = isLoginMode ? "none" : "block";
        }

        // Gửi dữ liệu lên Server (MongoDB)
        async function submitForm() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const region = document.getElementById('regionSelect').value;

            if(!username || !password) return alert("⚠️ Vui lòng nhập đầy đủ tên và mật khẩu!");

            document.getElementById('submitBtn').innerText = "⏳ Đang xử lý...";

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, region })
                });
                
                const data = await res.json();
                
                if(!res.ok) {
                    alert("❌ " + data.message); // Thông báo lỗi từ server (sai pass, trùng tên)
                    document.getElementById('submitBtn').innerText = isLoginMode ? "Đăng nhập" : "Đăng ký tài khoản";
                } else {
                    if(!isLoginMode) {
                        alert("✅ Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.");
                        toggleMode(); // Trở lại form đăng nhập
                    } else {
                        // Đăng nhập thành công -> Lưu tên và vào web
                        localStorage.setItem('userName', data.username);
                        window.location.href = '/'; 
                    }
                }
            } catch(err) {
                alert("❌ Lỗi kết nối tới Server!");
            }
        }

        // Bấm Enter để xác nhận nhanh
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitForm();
        });
    </script>
</body>
</html>
