<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Ghi chú Cloud</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #333;
        }
        h2 { color: #4CAF50; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2b2b2b;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #4CAF50, #2196F3);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>☁️ Ghi Chú Cloud</h2>
        <p style="color: #bbb; margin-bottom: 20px;">Vui lòng nhập tên để vào không gian của bạn</p>
        
        <input type="text" id="usernameInput" placeholder="Nhập tên đăng nhập của bạn..." required>
        <button onclick="login()">Vào Ghi Chú</button>
    </div>

    <script>
        function login() {
            const name = document.getElementById('usernameInput').value;
            if(name.trim() !== "") {
                // Lưu tên vào máy tính và bay thẳng sang giao diện chính
                localStorage.setItem('userName', name.trim());
                window.location.href = '/'; 
            } else {
                alert("⚠️ Vui lòng nhập tên!");
            }
        }

        // Hỗ trợ bấm phím Enter để vào luôn cho lẹ
        document.getElementById('usernameInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
