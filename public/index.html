<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverNote - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="rgb-wrapper">
        <div class="app-content">
            
            <div class="app-header">
                <span class="user-name">
                    <span id="display-name">Lý Diệu Cơ</span> 
                    <i class="fas fa-moon" id="theme-icon" onclick="toggleTheme()" title="Đổi giao diện"></i>
                </span>
                <div class="header-icons">
                    <i class="fas fa-trash" id="btn-clear-all" onclick="clearAllNotes()" title="Xóa tất cả"></i>
                    <i class="fas fa-cog" id="btn-settings" onclick="openSettings()" title="Cài đặt"></i>
                </div>
            </div>

            <div class="title-section">
                <h1 class="app-title">OverNote</h1>
                <div class="mode-dropdown-container">
                    <button class="btn-mode-toggle" onclick="toggleMenu()">Chế độ xem <i class="fas fa-plus"></i></button>
                    <div class="mode-dropdown-menu" id="modeMenu">
                        <div class="mode-option" onclick="changeMode('1-dong')"><i class="fas fa-list"></i> 1 Dòng (Ghi chú nhanh)</div>
                        <div class="mode-option" onclick="changeMode('trang-giay')"><i class="fas fa-file-alt"></i> Trang giấy (Soạn thảo)</div>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Tìm ghi chú...">
            </div>

            <div class="input-group" id="workspace-1-dong">
                <input type="text" id="note-input-single" placeholder="Nhập nội dung ghi chú nhanh...">
                <input type="color" class="color-picker" id="color-single" value="#4CAF50">
                <button class="btn-add" onclick="addNote()">Thêm</button>
            </div>

            <div class="input-group-page" id="workspace-trang-giay" style="display: none;">
                <textarea id="note-input-page" placeholder="Viết nội dung tài liệu chi tiết của bạn tại đây..."></textarea>
            </div>

            <div class="action-group">
                <button class="btn-draft" onclick="saveToCloud()"><i class="fas fa-save"></i> Lưu nháp</button>
                <button class="btn-cloud" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> Lưu Cloud</button>
            </div>

            <div class="sync-status">
                <i class="fas fa-check-square" style="color: #4CAF50;"></i> 
                Đã đồng bộ lúc <span id="sync-time">...</span>
            </div>

            <div class="notes-list-container" id="notesList">
                </div>

        </div> 
    </div>

    <script src="script.js"></script>
</body>
</html>
