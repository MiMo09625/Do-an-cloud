<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverNote - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="rgb-container">
        
        <div class="app-header">
            <span class="user-name">Lý Diệu Cơ <i class="fas fa-moon"></i></span>
            <div class="header-icons">
                <i class="fas fa-trash"></i>
                <i class="fas fa-cog"></i>
            </div>
        </div>

        <div class="title-section">
            <h1 class="app-title">OverNote</h1>
            
            <div class="mode-dropdown-container">
                <button class="btn-mode-toggle" onclick="toggleMenu()">Chế độ xem <i class="fas fa-plus"></i></button>
                <div class="mode-dropdown-menu" id="modeMenu">
                    <div class="mode-option" onclick="changeMode('1-dong')"><i class="fas fa-list"></i> 1 Dòng</div>
                    <div class="mode-option" onclick="changeMode('trang-giay')"><i class="fas fa-file-alt"></i> Trang giấy</div>
                    <div class="mode-option" onclick="changeMode('tung-o')"><i class="fas fa-th-large"></i> Từng ô (Lưới)</div>
                </div>
            </div>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Tìm ghi chú...">
        </div>

        <div class="input-group">
            <textarea id="note-input" class="mode-1-dong" placeholder="Nhập nội dung ghi chú..."></textarea>
            <input type="color" class="color-picker" value="#ffffff">
            <button class="btn-add">Thêm</button>
        </div>

        <div class="action-group">
            <button class="btn-draft"><i class="fas fa-save"></i> Lưu nháp</button>
            <button class="btn-cloud"><i class="fas fa-cloud-upload-alt"></i> Lưu Cloud</button>
        </div>

        <div class="sync-status">
            <i class="fas fa-check-square" style="color: #4CAF50;"></i> 
            Đã đồng bộ lúc <span id="sync-time">...</span>
        </div>

    </div>

    <div class="overlay" id="overlay" onclick="changeMode('1-dong')"></div>

    <script src="script.js"></script>
</body>
</html>
