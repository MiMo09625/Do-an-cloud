<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverNote - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="rgb-wrapper">
        
        <div class="app-content">
            
            <div class="app-header">
                <span class="user-name">Lý Diệu Cơ <i class="fas fa-moon"></i></span>
                <div class="header-icons">
                    <i class="fas fa-trash"></i>
                    <i class="fas fa-cog"></i>
                </div>
            </div>

            <div class="title-section">
                <h1 class="app-title">OverNote</h1>
                <div class="mode-dropdown-container">
                    <button class="btn-mode-toggle" onclick="toggleMenu()">Chế độ xem <i class="fas fa-plus"></i></button>
                    <div class="mode-dropdown-menu" id="modeMenu">
                        <div class="mode-option" onclick="changeMode('1-dong')"><i class="fas fa-list"></i> 1 Dòng (Gốc)</div>
                        <div class="mode-option" onclick="changeMode('trang-giay')"><i class="fas fa-file-alt"></i> Trang giấy</div>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Tìm ghi chú...">
            </div>

            <div class="input-group">
                <input type="text" id="note-input-single" placeholder="Nhập nội dung ghi chú...">
                <input type="color" class="color-picker" id="color-single" value="#ffffff">
                <button class="btn-add">Thêm</button>
            </div>

            <div class="action-group">
                <button class="btn-draft"><i class="fas fa-save"></i> Lưu nháp</button>
                <button class="btn-cloud"><i class="fas fa-cloud-upload-alt"></i> Lưu Cloud</button>
            </div>

            <div class="sync-status">
                <i class="fas fa-check-square" style="color: #4CAF50;"></i> 
                Đã đồng bộ lúc <span id="sync-time">...</span>
            </div>

        </div> </div> <div class="page-mode-overlay" id="pageModeOverlay">
        <div class="page-mode-container">
            <div class="page-header">
                <h2><i class="fas fa-edit"></i> Soạn thảo chi tiết</h2>
                <button class="btn-close" onclick="changeMode('1-dong')"><i class="fas fa-times"></i> Đóng lại</button>
            </div>
            
            <textarea id="note-input-page" placeholder="Bắt đầu viết ghi chú dài của bạn tại đây..."></textarea>
            
            <div class="page-actions">
                <input type="color" class="color-picker" id="color-page" value="#ffffff">
                <button class="btn-add" onclick="changeMode('1-dong')"><i class="fas fa-check"></i> Hoàn tất & Thêm</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
