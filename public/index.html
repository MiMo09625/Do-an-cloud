<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"> <!-- Đã sửa lỗi mela thành meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evernote Pro - 124041003_CNKTMT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-card">
        <header>
            <div class="user-info">
                <span id="userNameDisplay">Đang tải...</span>
                <div class="header-actions">
                    <i class="fas fa-moon dark-mode-toggle" onclick="toggleDarkMode()"></i>
                    <i class="fas fa-cog settings-icon"></i>
                </div>
            </div>
            <h1>Ghi chú Cloud</h1>
            <!-- TÍNH NĂNG 1: TÌM KIẾM NHANH -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm ghi chú..." oninput="searchNotes()">
            </div>
        </header>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Nội dung ghi chú...">
            <input type="color" id="colorPicker" value="#ffffff" title="Chọn màu ghi chú">
            <button onclick="addTodo()">Thêm</button>
        </div>

        <ul id="todoList"></ul>
        <p id="syncStatus">Đồng bộ tự động mỗi 10 giây...</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
