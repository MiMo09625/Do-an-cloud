<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverNote - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="rgb-container" id="app-container">
        
        <div class="app-header">
            <span class="user-name">Lý Diệu Cơ <i class="fas fa-moon"></i></span>
            <div class="header-icons">
                <i class="fas fa-trash"></i>
                <i class="fas fa-cog"></i>
            </div>
        </div>

        <h1 class="app-title">OverNote</h1>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Tìm ghi chú...">
        </div>

        <div class="view-modes">
            <button class="btn-mode" onclick="toggleMode('single-line')"><i class="fas fa-minus"></i> 1 Dòng</button>
            <button class="btn-mode" onclick="toggleMode('full-page')"><i class="fas fa-expand-arrows-alt"></i> Trang giấy</button>
        </div>

        <div class="input-group">
            <textarea id="note-content" class="single-line" placeholder="Nhập nội dung ghi chú..."></textarea>
            <input type="color" class="color-picker" value="#ffffff">
            <button class="btn-add">Thêm</button>
        </div>

        <div class="action-group">
            <button class="btn-draft"><i class="fas fa-save"></i> Lưu nháp</button>
            <button class="btn-cloud"><i class="fas fa-cloud-upload-alt"></i> Lưu Cloud</button>
        </div>

        <div class="sync-status">
            <i class="fas fa-check-square" style="color: #4CAF50;"></i> 
            Đã đồng bộ lúc <span id="sync-time">...</span>
        </div>

    </div>

    <div id="overlay" class="overlay" onclick="toggleMode('single-line')"></div>

    <script src="script.js"></script>
</body>
</html>
